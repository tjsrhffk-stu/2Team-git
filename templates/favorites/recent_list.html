{% extends 'base.html' %}

{% block title %}최근 본 맛집 — LocalEats{% endblock %}

{% block content %}
<div class="page fade-up">
  <h2 style="font-family:'Instrument Serif', serif; font-size:2.5rem; margin-bottom:32px; color:var(--text);">🕒 최근 본 맛집</h2>
  
  <div id="recent-list-container" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:24px;">
    </div>

  <div id="empty-message" style="display:none; text-align:center; padding:100px 0;">
    <p style="font-size:4rem; margin-bottom:16px;">🔍</p>
    <p style="color:var(--text2);">최근에 확인한 맛집이 아직 없습니다.</p>
    <a href="/restaurants/" class="btn btn-primary" style="margin-top:24px;">맛집 보러가기</a>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const recentStores = JSON.parse(localStorage.getItem('recentStores')) || [];
  const container = document.getElementById('recent-list-container');
  const emptyMessage = document.getElementById('empty-message');

  if (recentStores.length === 0) {
    emptyMessage.style.display = 'block';
    return;
  }

  recentStores.forEach(s => {
    // base.html의 카드 스타일 적용
    const cardHtml = `
      <div class="card shadow">
        <div style="height:200px; overflow:hidden; background:#eee;">
          <img src="${s.img}" style="width:100%; height:100%; object-fit:cover;" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
        </div>
        <div style="padding:20px;">
          <span style="font-size:0.75rem; color:var(--accent); font-weight:700; text-transform:uppercase;">${s.category}</span>
          <h3 style="margin:8px 0 12px; font-size:1.25rem; color:var(--text);">${s.name}</h3>
          <p style="font-size:0.875rem; color:var(--text2); margin-bottom:20px; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden;">
            📍 ${s.address}
          </p>
          <a href="/restaurants/${s.id}/" class="btn btn-outline" style="width:100%; justify-content:center;">상세보기</a>
        </div>
      </div>
    `;
    container.innerHTML += cardHtml;
  });
});
</script>
{% endblock %}
