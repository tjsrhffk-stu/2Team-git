{% extends 'base.html' %}
{% block title %}음식점 등록 — LocalEats{% endblock %}

{% block extra_css %}
<style>
  /* --- 사용자님의 오리지널 디자인 & 애니메이션 완벽 복구 --- */
  .page-wrap { max-width: 720px; margin: 0 auto; animation: fadeUp 0.5s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .page-title { font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 700; margin-bottom: 8px; }
  .page-subtitle { font-size: 15px; color: var(--text2); margin-bottom: 36px; }
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 36px; box-shadow: var(--shadow); }
  .form-section-title { font-size: 13px; font-weight: 700; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
  .form-section-title:first-child { margin-top: 0; padding-top: 0; border-top: none; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
  .required { color: var(--accent); }

  /* 클릭 시 아이콘 사라지는 애니메이션 CSS */
  .input-wrap { position: relative; }
  .input-wrap .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; transition: all 0.2s ease; opacity: 0.7; z-index: 2; }
  .form-input { width: 100%; padding: 13px 16px 13px 42px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; font-size: 15px; color: #333 !important; font-family: 'DM Sans', sans-serif; outline: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
  
  .form-input:placeholder-shown { padding-left: 42px; }
  .form-input:focus, .form-input:not(:placeholder-shown) { padding-left: 16px; }
  .form-input:focus + .icon, .form-input:not(:placeholder-shown) + .icon { opacity: 0; transform: translateY(-50%) translateX(-15px); }

  .form-select { width: 100%; padding: 13px 16px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; font-size: 15px; color: #333; font-family: 'DM Sans', sans-serif; cursor: pointer; }
  .form-textarea { width: 100%; padding: 14px 16px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; font-size: 15px; color: #333; min-height: 100px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .upload-area { border: 2px dashed var(--border); border-radius: 14px; padding: 36px; text-align: center; cursor: pointer; position: relative; }
  #imageInput { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }
  .btn-submit { padding: 15px 36px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
</style>
{% endblock %}

{% block content %}
<div class="page-wrap">
  <h1 class="page-title">음식점 등록 🏪</h1>
  <p class="page-subtitle">새로운 맛집을 등록해보세요.</p>

  <div class="form-card">
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="form-section-title">📋 기본 정보</div>

      <div class="form-group">
        <label>음식점 이름 <span class="required">*</span></label>
        <div class="input-wrap">
          <input type="text" name="name" class="form-input" placeholder="음식점 이름을 입력하세요" required value="{{ form_data.name|default:'' }}">
          <span class="icon">🏪</span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>카테고리 <span class="required">*</span></label>
          <select name="category" class="form-select" required>
            <option value="" disabled selected>카테고리 선택</option>
            {% for cat in categories %}
              <option value="{{ cat.pk }}" {% if form_data.category == cat.pk|stringformat:"s" %}selected{% endif %}>{{ cat.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>전화번호</label>
          <div class="input-wrap">
            <input type="tel" name="phone" class="form-input" placeholder="02-123-4567" value="{{ form_data.phone|default:'' }}">
            <span class="icon">📞</span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>소개 (선택)</label>
        <textarea name="description" class="form-textarea" placeholder="음식점을 간단히 소개해주세요...">{{ form_data.description|default:'' }}</textarea>
      </div>

      <div class="form-section-title">📍 위치 정보</div>
      <div class="form-group">
        <label>주소 <span class="required">*</span></label>
        <div class="input-wrap">
          <input type="text" name="address" class="form-input" placeholder="정확한 주소를 입력하세요" required value="{{ form_data.address|default:'' }}">
          <span class="icon">📍</span>
        </div>
      </div>

      <div class="form-section-title">🕒 운영 정보</div>
      <div class="form-row">
        <div class="form-group">
          <label>영업시간</label>
          <div class="input-wrap">
            <input type="text" name="hours" class="form-input" placeholder="예: 09:00 - 22:00" value="{{ form_data.hours|default:'' }}">
            <span class="icon">🕐</span>
          </div>
        </div>
        <div class="form-group">
          <label>휴무일</label>
          <div class="input-wrap">
            <input type="text" name="closed_days" class="form-input" placeholder="예: 매주 월요일" value="{{ form_data.closed_days|default:'' }}">
            <span class="icon">📅</span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>웹사이트</label>
        <div class="input-wrap">
          <input type="url" name="website" class="form-input" placeholder="https://..." value="{{ form_data.website|default:'' }}">
          <span class="icon">🌐</span>
        </div>
      </div>

      <div class="form-section-title">📷 대표 사진</div>
      <div class="upload-area" id="uploadArea">
        <input type="file" name="thumbnail" accept="image/*" id="imageInput">
        <div class="upload-icon">🖼️</div>
        <div class="upload-text">클릭하거나 이미지를 드래그하세요</div>
      </div>
      <div class="image-preview" id="imagePreview" style="display:none; margin-top:15px;">
        <img id="previewImg" src="" style="width:100%; border-radius:12px;">
      </div>

      <div class="form-submit" style="margin-top:30px; display:flex; gap:10px;">
        <button type="submit" class="btn-submit">등록하기</button>
        <a href="/restaurants/" style="padding:15px; background:#eee; border-radius:12px; text-decoration:none; color:#666; font-weight:600;">취소</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('imageInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('previewImg').src = ev.target.result;
      document.getElementById('imagePreview').style.display = 'block';
      document.getElementById('uploadArea').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }
});
</script>
{% endblock %}
