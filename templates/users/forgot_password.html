{% extends 'base.html' %}
{% block title %}비밀번호 찾기 — LocalEats{% endblock %}
{% block content %}
<div style="max-width:440px;margin:60px auto;padding:30px;border:1px solid #ddd;border-radius:16px;">
  <h2>비밀번호 찾기</h2>
  <p style="opacity:0.8;">가입한 <strong>아이디 + 이메일</strong>을 입력하면 재설정 링크를 보내드려요.</p>

  <form method="post">
    {% csrf_token %}
    <label>아이디</label><br>
    <input type="text" name="username" value="{{ username|default:'' }}" required style="width:100%;padding:12px;margin:8px 0 16px;">

    <label>이메일</label><br>
    <input type="email" name="email" value="{{ email|default:'' }}" required style="width:100%;padding:12px;margin:8px 0 16px;">

    <button type="submit" style="width:100%;padding:12px;">재설정 링크 보내기</button>
  </form>

  <div style="margin-top:16px;">
    <a href="/users/login/">로그인으로 돌아가기</a>
  </div>
</div>
{% endblock %}
