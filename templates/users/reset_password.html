{% extends 'base.html' %}
{% block title %}비밀번호 재설정 — LocalEats{% endblock %}
{% block content %}
<div style="max-width:440px;margin:60px auto;padding:30px;border:1px solid #ddd;border-radius:16px;">
  <h2>새 비밀번호 설정</h2>

  <form method="post">
    {% csrf_token %}
    <label>새 비밀번호</label><br>
    <input type="password" name="password1" required style="width:100%;padding:12px;margin:8px 0 16px;">

    <label>새 비밀번호 확인</label><br>
    <input type="password" name="password2" required style="width:100%;padding:12px;margin:8px 0 16px;">

    <button type="submit" style="width:100%;padding:12px;">비밀번호 변경</button>
  </form>

  <div style="margin-top:16px;">
    <a href="/users/login/">로그인으로 돌아가기</a>
  </div>
</div>
{% endblock %}
