<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>사장 회원가입</title>
</head>
<body>
  <h2>사장(식당사장) 회원가입</h2>

  {% if messages %}
    <ul>
      {% for message in messages %}
        <li>{{ message }}</li>
      {% endfor %}
    </ul>
  {% endif %}

  <form method="post">
    {% csrf_token %}

    <div>
      <label>아이디</label>
      <input name="username" value="{{ username|default:'' }}" />
    </div>

    <div>
      <label>이메일</label>
      <input name="email" value="{{ email|default:'' }}" />
    </div>

    <div>
      <label>비밀번호</label>
      <input type="password" name="password1" />
    </div>

    <div>
      <label>비밀번호 확인</label>
      <input type="password" name="password2" />
    </div>

    <button type="submit">가입하기</button>
  </form>

  <hr />
  <p>일반 회원가입은 <a href="/users/signup/">여기</a></p>
</body>
</html>
